<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام الشرطة المتقدم</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="hidden">
    <div class="screen-bg"></div>
    <div class="hud-frame">
      <aside class="left-column panel">
        <h2>الوحدات السريعة</h2>
        <div id="quickActions" class="quick-actions"></div>
        <div class="mini-card">
          <span>الرتبة الحالية</span>
          <strong id="rankLabel">-</strong>
        </div>
      </aside>

      <section class="center-column panel">
        <header class="center-header">
          <h1>AI Police Dispatch & Backup</h1>
          <button id="closeBtn" class="ghost">إغلاق ✕</button>
        </header>
        <div class="map-wrap">
          <div class="grid-overlay"></div>
          <div id="incidentPins" class="pins"></div>
        </div>

        <div class="command-bar">
          <button data-action="dispatch_backup" class="action">طلب دعم فوري</button>
          <button data-action="drone_record" class="action">تسجيل درون</button>
          <button data-action="shift_report" class="action">تقرير نهاية الشفت</button>
        </div>

        <div class="forms-grid">
          <article class="module">
            <h3>التحقيق الجنائي المتقدم</h3>
            <form id="caseForm" class="stack">
              <input name="title" placeholder="عنوان القضية" required />
              <input name="type" placeholder="نوع القضية" required />
              <textarea name="summary" placeholder="ملخص القضية" required></textarea>
              <input name="suspects" placeholder="المشتبه بهم (,)" />
              <button type="submit">فتح ملف قضية</button>
            </form>
          </article>

          <article class="module">
            <h3>التحقيق الصوتي والاعترافات</h3>
            <form id="interrogationForm" class="stack">
              <select name="caseId" id="caseSelect"></select>
              <input name="question" placeholder="سؤال التحقيق" />
              <input name="answer" placeholder="الإجابة" />
              <input name="impact" placeholder="تأثير الإجابة على القضية" />
              <button type="submit">حفظ جلسة التحقيق</button>
            </form>
          </article>

          <article class="module">
            <h3>وسم الأدلة البصري</h3>
            <form id="evidenceForm" class="stack">
              <select name="caseId" class="case-ref"></select>
              <input name="evidenceType" placeholder="نوع الدليل (صورة/فيديو/صوت)" />
              <input name="media" placeholder="رابط/معرف الوسائط" />
              <textarea name="notes" placeholder="ملاحظات النيابة"></textarea>
              <button type="submit">حفظ الدليل</button>
            </form>
          </article>

          <article class="module">
            <h3>نظام K9 + المطاردة</h3>
            <form id="opsForm" class="stack">
              <input name="area" placeholder="المنطقة" />
              <select name="command">
                <option value="تتبع مسار">K9: تتبع مسار</option>
                <option value="كشف مخدرات">K9: كشف مخدرات</option>
                <option value="بحث مفقود">K9: بحث عن مفقود</option>
              </select>
              <select name="tool">
                <option value="Spike Strip">سبايك ستريب</option>
                <option value="Road Block">حاجز مروري</option>
                <option value="Moving Barrier">حاجز متحرك</option>
              </select>
              <button type="button" id="k9Btn">تنفيذ أمر K9</button>
              <button type="button" id="pursuitBtn">تفعيل أداة مطاردة</button>
            </form>
          </article>

          <article class="module">
            <h3>أكاديمية الشرطة</h3>
            <form id="academyForm" class="stack">
              <input name="trainee" placeholder="هوية المتدرب" />
              <input name="driving" type="number" min="0" max="100" placeholder="اختبار القيادة" />
              <input name="shooting" type="number" min="0" max="100" placeholder="اختبار الرماية" />
              <input name="aiDecision" type="number" min="0" max="100" placeholder="مواقف الذكاء" />
              <button type="submit">اعتماد نتيجة التدريب</button>
            </form>
          </article>

          <article class="module">
            <h3>توجيه الدوريات المباشر</h3>
            <form id="patrolForm" class="stack">
              <input name="unit" placeholder="اسم الدورية" />
              <input name="zone" placeholder="المنطقة" />
              <select name="priority">
                <option value="منخفض">منخفض</option>
                <option value="متوسط">متوسط</option>
                <option value="عاجل">عاجل</option>
              </select>
              <button type="submit">توزيع دورية</button>
            </form>
          </article>
        </div>
      </section>

      <aside class="right-column panel">
        <h2>لوحة القيادة</h2>
        <div class="mini-card">
          <span>القضايا</span>
          <strong id="caseCount">0</strong>
        </div>
        <div class="mini-card">
          <span>البلاغات النشطة</span>
          <strong id="incidentCount">0</strong>
        </div>
        <div class="mini-card">
          <span>إجمالي الإنجاز</span>
          <strong id="efficiency">0%</strong>
        </div>

        <h3>أحدث العناصر</h3>
        <div id="feed" class="feed"></div>
      </aside>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>

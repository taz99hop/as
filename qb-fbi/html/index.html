<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Dispatch Command Center</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="hidden">
    <div class="screen-bg"></div>
    <div class="hud-frame">
      <aside class="left-column panel">
        <h2>الوحدات أون ديوتي</h2>
        <div class="mini-card"><span>الرتبة</span><strong id="rankLabel">-</strong></div>
        <div class="mini-card"><span>الحالة</span><select id="myStatus"></select></div>
        <div id="unitsList" class="feed"></div>
      </aside>

      <section class="center-column panel">
        <header class="center-header">
          <h1 id="projectTitle">qb-smartdispatch</h1>
          <button id="closeBtn" class="ghost">إغلاق ✕</button>
        </header>

        <div class="map-wrap">
          <div class="grid-overlay"></div>
          <div id="pins" class="pins"></div>
        </div>

        <div class="command-bar">
          <button id="newIncidentBtn">بلاغ جديد</button>
          <button id="panicBtn">PANIC TEST</button>
          <button id="emergencyBtn">حالة طوارئ المدينة</button>
        </div>

        <div class="forms-grid">
          <article class="module">
            <h3>لوحة البلاغات</h3>
            <form id="incidentForm" class="stack">
              <input name="type" placeholder="نوع البلاغ" required />
              <input name="locationText" placeholder="الموقع" required />
              <select name="priority">
                <option>Low</option>
                <option selected>Normal</option>
                <option>High</option>
                <option>Critical</option>
              </select>
              <textarea name="description" placeholder="وصف البلاغ"></textarea>
            </form>
            <div id="incidentsList" class="feed"></div>
          </article>

          <article class="module">
            <h3>التوزيع الذكي</h3>
            <form id="dispatchForm" class="stack">
              <select id="dispatchIncident"></select>
              <select name="mode" id="dispatchMode">
                <option value="all">إرسال للجميع</option>
                <option value="rank">إرسال لرتبة</option>
                <option value="closest">إرسال لأقرب وحدة</option>
                <option value="unit">إرسال لوحدة محددة</option>
              </select>
              <input name="rank" placeholder="rank: officer/sergeant/chief" />
              <input name="targetSource" placeholder="source id للوحدة" />
              <button type="submit">تنفيذ التوزيع</button>
            </form>

            <h3 style="margin-top:8px">الكاميرات</h3>
            <form id="cameraForm" class="stack">
              <select id="cameraSelect"></select>
              <select id="cameraIncident"></select>
              <button type="button" id="openCameraBtn">عرض الكاميرا</button>
              <button type="button" id="linkCameraBtn">ربط الكاميرا ببلاغ</button>
            </form>
          </article>

          <article class="module">
            <h3>أرشفة / بحث</h3>
            <form id="historyForm" class="stack">
              <input name="dateFrom" placeholder="من تاريخ (YYYY-MM-DD)" />
              <input name="dateTo" placeholder="إلى تاريخ (YYYY-MM-DD)" />
              <input name="officer" placeholder="اسم الشرطي" />
              <input name="crimeType" placeholder="نوع الجريمة" />
              <button type="submit">بحث</button>
            </form>
            <div id="historyList" class="feed"></div>
          </article>

          <article class="module">
            <h3>إحصائيات / Heatmap</h3>
            <div class="mini-card"><span>البلاغات النشطة</span><strong id="activeIncidents">0</strong></div>
            <div class="mini-card"><span>الوحدات أون ديوتي</span><strong id="activeUnits">0</strong></div>
            <div class="mini-card"><span>حالة المدينة</span><strong id="cityState">NORMAL</strong></div>
            <div id="heatmapList" class="feed"></div>
          </article>
        </div>
      </section>

      <aside class="right-column panel">
        <h2>التنبيهات المباشرة</h2>
        <div id="alertsFeed" class="feed"></div>
      </aside>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
